name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main or dev branch
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  IMAGE_NAME: hsos-sep-plant-map-2022

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # builds the docker image if the corresponding files changed
  build-docker:
    # run on ubuntu
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v2

      - name: Meta
        id: meta
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME

          # Change all uppercase to lowercase
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          # Set Docker tag from branch
          VERSION=${{ github.ref_name }}
          # Replace slashes
          VERSION=$(echo $VERSION | tr '/' '-')
          # Use Docker `latest` tag convention
          [ "$VERSION" == "main" ] && VERSION=latest
          IMAGE_ID_FRONTEND=$IMAGE_ID-frontend:$VERSION
          IMAGE_ID_BACKEND=$IMAGE_ID-backend:$VERSION

          echo IMAGE_ID_FRONTEND=$IMAGE_ID_FRONTEND
          echo IMAGE_ID_BACKEND=$IMAGE_ID_BACKEND
          echo "::set-output name=docker_tag_frontend::$IMAGE_ID_FRONTEND"
          echo "::set-output name=docker_tag_backend::$IMAGE_ID_BACKEND"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend
        uses: docker/build-push-action@v3
        with:
          context: django
          tags: ${{ steps.meta.outputs.docker_tag_backend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        uses: docker/build-push-action@v3
        with:
          context: vue
          tags: ${{ steps.meta.outputs.docker_tag_frontend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
